<!DOCTYPE html>  
<html lang="es">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Nosotros · Grupo Aragón</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">  
    <style>  
        /* ========== RESET & BASE ========== */  
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }  
        html { scroll-behavior: smooth; }  
        body {  
            font-family: 'Inter', sans-serif;  
            background: #0b0b0e;  
            color: #e8e8ed;  
            line-height: 1.6;  
            overflow-x: hidden;  
            transition: background 0.4s, color 0.4s;  
        }  
        body.light-mode {  
            background: #f5f5f7;  
            color: #1c1c1e;  
        }  
        a { text-decoration:none; color:inherit; }  
        img { max-width:100%; display:block; }  

        ::-webkit-scrollbar { width:8px; }  
        ::-webkit-scrollbar-track { background:#1a1a1e; }  
        ::-webkit-scrollbar-thumb { background:#3a3a3e; border-radius:10px; }  
        body.light-mode ::-webkit-scrollbar-track { background:#e5e5e7; }  
        body.light-mode ::-webkit-scrollbar-thumb { background:#aaa; }  

        /* ========== VARIABLES ========== */  
        :root {  
            --primary: #6c5ce7;  
            --primary-dark: #5a4bd6;  
            --accent: #00d4aa;  
            --bg-dark: #0b0b0e;  
            --bg-card: rgba(255,255,255,0.04);  
            --bg-card-hover: rgba(255,255,255,0.08);  
            --border-glass: rgba(255,255,255,0.06);  
            --text-muted: #8e8e93;  
            --glass-blur: 20px;  
        }  
        body.light-mode {  
            --bg-card: rgba(0,0,0,0.03);  
            --bg-card-hover: rgba(0,0,0,0.06);  
            --border-glass: rgba(0,0,0,0.08);  
            --text-muted: #6e6e73;  
        }  

        .glass-card {  
            background: var(--bg-card);  
            backdrop-filter: blur(var(--glass-blur));  
            -webkit-backdrop-filter: blur(var(--glass-blur));  
            border: 1px solid var(--border-glass);  
            border-radius: 20px;  
            transition: all 0.4s ease;  
        }
